services:
  api:
    build: .
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000"
    env_file: .env
    environment:
      STT_MODE: ${STT_MODE:-local_whisper}
      LOCAL_WHISPER_MODEL: ${LOCAL_WHISPER_MODEL:-base}
      LOCAL_WHISPER_DEVICE: ${LOCAL_WHISPER_DEVICE:-cpu}
      LOCAL_WHISPER_COMPUTE_TYPE: ${LOCAL_WHISPER_COMPUTE_TYPE:-int8}
      LOCAL_WHISPER_LANGUAGE: ${LOCAL_WHISPER_LANGUAGE:-ru}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build: .
    restart: unless-stopped
    command: python -m app.bot.main
    env_file: .env
    environment:
      STT_MODE: ${STT_MODE:-local_whisper}
      LOCAL_WHISPER_MODEL: ${LOCAL_WHISPER_MODEL:-base}
      LOCAL_WHISPER_DEVICE: ${LOCAL_WHISPER_DEVICE:-cpu}
      LOCAL_WHISPER_COMPUTE_TYPE: ${LOCAL_WHISPER_COMPUTE_TYPE:-int8}
      LOCAL_WHISPER_LANGUAGE: ${LOCAL_WHISPER_LANGUAGE:-ru}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  listener:
    build:
      context: .
      dockerfile: Dockerfile.listener
    restart: unless-stopped
    command: python -m app.listener.main
    env_file: .env
    environment:
      LISTENER_ENABLED: ${LISTENER_ENABLED:-false}
      LISTENER_STORAGE_DIR: ${LISTENER_STORAGE_DIR:-/var/lib/rhapsody/listener}
      STT_MODE: ${STT_MODE:-local_whisper}
      LOCAL_WHISPER_MODEL: ${LOCAL_WHISPER_MODEL:-base}
      LOCAL_WHISPER_DEVICE: ${LOCAL_WHISPER_DEVICE:-cpu}
      LOCAL_WHISPER_COMPUTE_TYPE: ${LOCAL_WHISPER_COMPUTE_TYPE:-int8}
      LOCAL_WHISPER_LANGUAGE: ${LOCAL_WHISPER_LANGUAGE:-ru}
    volumes:
      - listener_spool:/var/lib/rhapsody/listener
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=INFO --concurrency=1
    env_file: .env
    environment:
      STT_MODE: ${STT_MODE:-local_whisper}
      LOCAL_WHISPER_MODEL: ${LOCAL_WHISPER_MODEL:-base}
      LOCAL_WHISPER_DEVICE: ${LOCAL_WHISPER_DEVICE:-cpu}
      LOCAL_WHISPER_COMPUTE_TYPE: ${LOCAL_WHISPER_COMPUTE_TYPE:-int8}
      LOCAL_WHISPER_LANGUAGE: ${LOCAL_WHISPER_LANGUAGE:-ru}
    volumes:
      - listener_spool:/var/lib/rhapsody/listener
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: rhapsody
      POSTGRES_USER: rhapsody
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rhapsody -d rhapsody"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:?S3_ACCESS_KEY_ID is required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:?S3_SECRET_ACCESS_KEY is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    restart: on-failure
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY} &&
        mc mb --ignore-existing local/${S3_BUCKET:-rhapsody} &&
        echo 'MinIO bucket ready.'
      "

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  listener_spool:
  caddy_data:
  caddy_config:
