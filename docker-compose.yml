services:
  api:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000"
    env_file: .env
    environment:
      STT_MODE: ${STT_MODE:-local_whisper}
      LOCAL_WHISPER_MODEL: ${LOCAL_WHISPER_MODEL:-small}
      LOCAL_WHISPER_DEVICE: ${LOCAL_WHISPER_DEVICE:-cpu}
      LOCAL_WHISPER_COMPUTE_TYPE: ${LOCAL_WHISPER_COMPUTE_TYPE:-int8}
      LOCAL_WHISPER_LANGUAGE: ${LOCAL_WHISPER_LANGUAGE:-ru}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=INFO
    env_file: .env
    environment:
      STT_MODE: ${STT_MODE:-local_whisper}
      LOCAL_WHISPER_MODEL: ${LOCAL_WHISPER_MODEL:-small}
      LOCAL_WHISPER_DEVICE: ${LOCAL_WHISPER_DEVICE:-cpu}
      LOCAL_WHISPER_COMPUTE_TYPE: ${LOCAL_WHISPER_COMPUTE_TYPE:-int8}
      LOCAL_WHISPER_LANGUAGE: ${LOCAL_WHISPER_LANGUAGE:-ru}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  bot:
    build: .
    command: python -m app.bot.main
    env_file: .env
    environment:
      STT_MODE: ${STT_MODE:-local_whisper}
      LOCAL_WHISPER_MODEL: ${LOCAL_WHISPER_MODEL:-small}
      LOCAL_WHISPER_DEVICE: ${LOCAL_WHISPER_DEVICE:-cpu}
      LOCAL_WHISPER_COMPUTE_TYPE: ${LOCAL_WHISPER_COMPUTE_TYPE:-int8}
      LOCAL_WHISPER_LANGUAGE: ${LOCAL_WHISPER_LANGUAGE:-ru}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  listener:
    build:
      context: .
      dockerfile: Dockerfile.listener
    command: python -m app.listener.main
    env_file: .env
    environment:
      STT_MODE: ${STT_MODE:-local_whisper}
      LOCAL_WHISPER_MODEL: ${LOCAL_WHISPER_MODEL:-small}
      LOCAL_WHISPER_DEVICE: ${LOCAL_WHISPER_DEVICE:-cpu}
      LOCAL_WHISPER_COMPUTE_TYPE: ${LOCAL_WHISPER_COMPUTE_TYPE:-int8}
      LOCAL_WHISPER_LANGUAGE: ${LOCAL_WHISPER_LANGUAGE:-ru}
    profiles:
      - listener
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: teammind
      POSTGRES_USER: teammind
      POSTGRES_PASSWORD: teammind
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teammind -d teammind"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/teammind &&
        echo 'MinIO bucket ready.'
      "
    restart: on-failure

volumes:
  pgdata:
  miniodata:
